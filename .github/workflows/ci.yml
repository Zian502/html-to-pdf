name: CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and build PDF
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install pnpm
        run: npm install --global pnpm@11.5.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build smoke-test PDF
        run: |
          mkdir -p dist
          node ./src/cli.mjs ./examples/report.html ./dist/smoke-test.pdf --full-page

      - name: Verify PDF artifact
        run: |
          node --input-type=module -e "
            import fs from 'node:fs';
            const file = './dist/smoke-test.pdf';
            const data = fs.readFileSync(file);
            if (data.length < 1024 || data.subarray(0, 5).toString() !== '%PDF-') {
              throw new Error('Smoke-test output is not a valid PDF');
            }
            console.log('Verified PDF:', data.length, 'bytes');
          "

      - name: Publish PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: html-to-pdf-${{ github.sha }}
          path: dist/smoke-test.pdf
          if-no-files-found: error
          retention-days: 7
